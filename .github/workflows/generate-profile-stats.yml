name: Generate Profile Stats

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate stats card (light)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=dotoroto&show_icons=true&hide_border=true&bg_color=00000000&title_color=111111&text_color=ffb8d1&icon_color=ffffff&ring_color=ffffff&rank_icon=github&custom_title=dotoroto%27s%20github%20stats
          path: profile/stats-light.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate stats card (dark)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=dotoroto&show_icons=true&hide_border=true&bg_color=00000000&title_color=ffffff&text_color=ffb8d1&icon_color=ffffff&ring_color=ffffff&rank_icon=github&custom_title=dotoroto%27s%20github%20stats
          path: profile/stats-dark.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card (light)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=dotoroto&layout=compact&hide_border=true&bg_color=00000000&title_color=111111&text_color=ff8fbc&custom_title=most%20used%20languages
          path: profile/top-langs-light.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card (dark)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=dotoroto&layout=compact&hide_border=true&bg_color=00000000&title_color=ffffff&text_color=ff8fbc&custom_title=most%20used%20languages
          path: profile/top-langs-dark.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit generated cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update profile stats" || exit 0
          git push
